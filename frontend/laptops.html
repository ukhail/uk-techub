<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptops - UK TECHUB</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        /* 1. SCREENSHOT MATCHING CSS */
        *{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        .shop-container { 
            background-color: #ffffff; /* White page background from screenshot */
            padding: 60px 8% 100px; 
            min-height: 100vh;
        }

        .header-content h1 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -2px;
            color: #fff;
            margin-top: 20px;
        }

        /* Centered Pill Search Bar */
        .search-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
        }

        .search-bar-pill {
            width: 100%;
            max-width: 550px;
            border: 1.5px solid #0071e3; /* Blue border from screenshot */
            border-radius: 50px;
            padding: 14px 25px;
            background: #fff;
        }

        #laptopSearch {
            width: 100%;
            border: none;
            outline: none;
            text-align: center;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* THE DARK PRODUCT CARD */
        .featured-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .product-card {
            background: #000000; /* Pure black card background */
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .img-container {
            background-color: #f5f5f7; /* Light grey image container */
            border-radius: 16px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .img-container img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .product-card h3 {
            color: #ffffff; /* White name */
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .item-price {
            color: #0071e3; /* BRIGHT BLUE PRICE */
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* White full-width button */
        .add-to-cart-btn {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-to-cart-btn:hover {
            background: #e8e8ed;
        }

        @media (max-width: 992px) {
            .featured-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header class="shop-page-header" style="background-color: #0d1117; padding-bottom: 60px;">
        <nav class="navbar">
    <div class="logo">🖱️UKTECHUB</div>

    <ul class="nav-links">
        <li><a href="index.html" class="active">HOME</a></li>
        <li><a href="products.html">PRODUCTS</a></li>
        <li><a href="aboutus.html">ABOUT US</a></li>
        <li><a href="service.html">SERVICES</a></li>
        <li><a href="contactus.html">CONTACT US</a></li>
        
        <li class="cart-wrapper">
            <a href="cart.html" class="nav-cart-text">CART (<span id="cart-count">0</span>)</a>
            <div class="mini-cart-dropdown" id="mini-cart">
                <div id="mini-cart-items"></div>
                <div class="mini-cart-footer">
                    <div class="mini-subtotal">
                        <span>SUBTOTAL:</span>
                        <span id="mini-cart-total">$0.00</span>
                    </div>
                    <div class="mini-buttons">
                        <a href="cart.html" class="btn-mini">VIEW CART</a>
                        <a href="#" class="btn-mini checkout">CHECKOUT</a>
                    </div>
                </div>
            </div>
        </li>
    </ul>

    <div class="nav-icons" id="auth-section">
        <span>🔍</span>
    </div>
</nav>

        <div class="header-content" style="padding-top: 140px; text-align: center;">
            <p style="color: #86868b; font-size: 12px; letter-spacing: 2px;">CATEGORY</p>
            <h1>LAPTOPS</h1>
        </div>
    </header>

    <main class="shop-container">
        <div class="search-wrapper">
            <div class="search-bar-pill">
                <input type="text" id="laptopSearch" placeholder="SEARCH LAPTOPS..." onkeyup="filterLaptops()">
            </div>
        </div>

        <div id="laptop-grid" class="featured-grid">
            </div>
    </main>

    <script>
    // 1. INITIAL LOAD
    window.addEventListener('DOMContentLoaded', () => {
        loadLaptops();
    });

    // 2. FETCH AND RENDER (DARK CARD DESIGN)
    async function loadLaptops() {
        try {
            // Fetching from the specific category route we created
            const response = await fetch('https://uk-techub-1.onrender.com/api/product/category/laptops');
            const laptops = await response.json();

            console.log("Data received from server:", laptops); // CHECK YOUR BROWSER CONSOLE
            
            const grid = document.getElementById('laptop-grid');
            
            // Handle cases where no laptops exist yet
            if (!laptops || laptops.length === 0) {
                grid.innerHTML = `<p style="color:#86868b; grid-column: 1/-1; text-align:center; padding: 50px;">No Laptops found in the store.</p>`;
                return;
            }

            // Map the data into the dark-card design from your screenshot
            grid.innerHTML = laptops.map(item => `
                <div class="product-card">
                    <div class="img-container">
                        <img src="https://uk-techub-1.onrender.com/image/${item.image}" alt="${item.name}">
                    </div>
                    <h3>${item.name}</h3>
                    <p class="item-price">$${item.price}.00</p>
                    <button class="add-to-cart-btn" onclick="addToCart('${item.name}', ${item.price}, '${item.image}')">
                        ADD TO CART
                    </button>
                </div>
            `).join('');
        } catch (error) {
            console.error("Error loading laptops:", error);
        }
    }

    // 3. SEARCH FILTERING (PILL SEARCH BAR)
    function filterLaptops() {
        let searchTerm = document.getElementById('laptopSearch').value.toLowerCase();
        let allCards = document.querySelectorAll('.product-card');

        allCards.forEach(card => {
            let name = card.querySelector('h3').innerText.toLowerCase();
            // Using 'flex' to match the card layout or 'block'
            card.style.display = name.includes(searchTerm) ? "flex" : "none";
        });
    }

    // 4. ADD TO CART FUNCTION (Essential for the button to work)
    function addToCart(name, price, image) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        // Check if item already exists
        const existingItem = cart.find(item => item.name === name);
        if (existingItem) {
            existingItem.quantity = (existingItem.quantity || 1) + 1;
        } else {
            cart.push({ name, price, image, quantity: 1 });
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        
        // If you have a mini-cart or count in your navbar, update it here
        if (typeof updateMiniCart === "function") updateMiniCart();
        
        alert(name + " added to bag!");
    }
</script>
</body>
</html>
