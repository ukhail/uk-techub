<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - UK TECHUB</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body style="background-color: #ffffff; color: rgb(0, 0, 0);"> <header class="shop-page-header">
    <nav class="navbar">
        <div class="logo">🖱️UKTECHUB</div>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="products.html" class="active">PRODUCTS</a></li>
            <li><a href="aboutus.html">ABOUT US</a></li>
            <li><a href="service.html">SERVICES</a></li>
            <li><a href="contactus.html">CONTACT US</a></li>
            
            <li class="cart-wrapper">
                <a href="cart.html" class="nav-cart-text">CART (<span id="cart-count">0</span>)</a>
                <div class="mini-cart-dropdown" id="mini-cart">
                    <div id="mini-cart-items"></div>
                    <div class="mini-cart-footer">
                        <div class="mini-subtotal">
                            <span>SUBTOTAL:</span>
                            <span id="mini-cart-total">$0.00</span>
                        </div>
                        <div class="mini-buttons">
                            <a href="cart.html" class="btn-mini">VIEW CART</a>
                            <a href="checkout.html" class="btn-mini checkout">CHECKOUT</a>
                        </div>
                    </div>
                </div>
            </li>
        </ul>
        <div class="nav-icons" id="auth-section"><span>🔍</span></div>
    </nav>

    <div class="header-content" style="padding-top: 150px; text-align: center;">
        
        <h1 style="font-size: 48px; margin-top: 10px;">SHOP ALL</h1>
    </div>
</header>

<main class="shop-container">
   <div class="search-wrapper">
    <div class="search-bar">
        <input type="text" id="productSearch" placeholder="SEARCH ALL PRODUCTS..." onkeyup="filterProducts()" spellcheck="false">
    </div>
</div>
</div>

    <div id="all-products-grid" class="featured-grid" style="padding: 0 8% 100px;"></div>
</main>

    <script src="../JS/main.js"></script>
    <script>
        // Use the function already inside your main.js but point it to the new grid ID
        window.addEventListener('DOMContentLoaded', () => {
            loadAllShopProducts();
        });

        async function loadAllShopProducts() {
            try {
                const response = await fetch('http://uk-techub-1.onrender.com/api/product');
                const data = await response.json();
                
                // Pointing to the specific grid for this page
                const displayArea = document.getElementById('all-products-grid');
                if (!displayArea) return;

                displayArea.innerHTML = data.map(item => `
                    <div class="product-card">
                        <div class="img-container">
                            <img src="http://uk-techub-1.onrender.com/image/${item.image}" alt="${item.name}">
                        </div>
                        <div class="product-info">
                            <h3 class="caps">${item.name}</h3>
                            <p class="item-price">$${item.price}.00</p>
                            <button class="add-to-cart-btn" onclick="addToCart('${item.name}', ${item.price}, '${item.image}')">
                                ADD TO CART
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Error loading products:", error);
            }
        }

      function filterProducts() {
    // 1. Get what user typed
    let searchTerm = document.getElementById('productSearch').value.toLowerCase();
    
    // 2. Grab every single card on the page
    let allCards = document.querySelectorAll('.product-card');

    allCards.forEach(card => {
        // 3. Find the text inside the <h3> (Product Name)
        let productName = card.querySelector('h3').innerText.toLowerCase();
        
        // 4. Compare
        if (productName.includes(searchTerm)) {
            card.style.display = "block";  // Show it
            card.style.opacity = "1";
        } else {
            card.style.display = "none";   // Hide it
        }
    });
}

window.onload = function() {
    // 1. Check if a user name is saved in the browser's memory
    const userName = localStorage.getItem("loggedInUser");
    const loginBtn = document.querySelector(".btn-login-nav"); // Adjust selector to your login button class
    const userDisplay = document.querySelector(".user-name-display"); // Adjust to your "HI, NAME" class

    if (userName) {
        // IF LOGGED IN: Show name, hide login button
        if(userDisplay) userDisplay.innerText = "HI, " + userName.toUpperCase();
        if(loginBtn) loginBtn.style.display = "none";
    } else {
        // IF NOT LOGGED IN: Hide name, show login button
        if(userDisplay) userDisplay.style.display = "none";
        if(loginBtn) loginBtn.style.display = "block";
    }
}

window.addEventListener('DOMContentLoaded', () => {
    loadAllShopProducts().then(() => {
        // Check if there is a category in the URL (e.g., ?cat=laptops)
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('cat');
        
        if (category) {
            // Set the search bar value and trigger the filter
            const searchBar = document.getElementById('productSearch');
            searchBar.value = category;
            filterProducts(); 
        }
    });
});
    </script>
</body>
</html>
