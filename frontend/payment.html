<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE PAYMENT - UK TECHUB</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; }
        .pay-container { max-width: 600px; margin: 120px auto; padding: 40px; background: #161617; border-radius: 24px; border: 1px solid #2c2c2e; }
        .tab-box { display: flex; gap: 10px; margin-bottom: 30px; background: #000; padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 12px; font-weight: 600; color: #86868b; transition: 0.3s; }
        .tab.active { background: #1c1c1e; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #86868b; margin-bottom: 8px; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #2c2c2e; border-radius: 10px; color: #fff; outline: none; box-sizing: border-box; }
        input:focus { border-color: #0071e3; }

        .pay-btn { width: 100%; padding: 20px; border-radius: 12px; border: none; background: #1c1c1e; color: #424245; font-weight: 700; cursor: not-allowed; transition: 0.3s; margin-top: 20px; }
        .pay-btn.ready { background: #0071e3; color: #fff; cursor: pointer; }
        
        /* SUCCESS OVERLAY */
        #finish-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .success-card { text-align: center; background: #1c1c1e; padding: 50px; border-radius: 30px; border: 1px solid #2c2c2e; transform: scale(0.8); opacity: 0; transition: 0.5s; }
        .success-card.pop { transform: scale(1); opacity: 1; }
    </style>
</head>
<body>

    <div class="pay-container">
        <h2 style="margin-top:0; letter-spacing:-1px;">PAYMENT METHOD</h2>
        
        <div class="tab-box">
            <div class="tab active" onclick="setTab('card', this)">CREDIT CARD</div>
            <div class="tab" onclick="setTab('upi', this)">UPI ID</div>
            <div class="tab" onclick="setTab('cod', this)">CASH ON DELIVERY</div>
        </div>

        <form id="payForm">
            <div class="input-group">
                <label>RECEIPT EMAIL *</label>
                <input type="email" id="email" placeholder="WHERE SHOULD WE SEND THE RECEIPT?" required>
            </div>

            <div id="section-card">
                <div class="input-group">
                    <label>CARD NUMBER</label>
                    <input type="text" id="card-num" class="v-card" placeholder="0000 0000 0000 0000">
                </div>
                <div style="display:flex; gap:15px;">
                    <div class="input-group" style="flex:1;">
                        <label>EXPIRY</label>
                        <input type="text" id="card-exp" class="v-card" placeholder="MM/YY">
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label>CVV</label>
                        <input type="password" class="v-card" placeholder="123" maxlength="3">
                    </div>
                </div>
            </div>

            <div id="section-upi" style="display:none;">
                <label>VIRTUAL PAYMENT ADDRESS</label>
                <input type="text" class="v-upi" placeholder="username@upi">
            </div>

            <div id="section-cod" style="display:none;">
                <p style="color:#86868b; font-size:12px; line-height:1.6;">YOU WILL PAY THE TOTAL AMOUNT IN CASH UPON DELIVERY TO YOUR DOORSTEP.</p>
            </div>

            <button type="submit" id="main-action" class="pay-btn" disabled>ENTER DETAILS</button>
        </form>
    </div>

    <div id="finish-overlay">
        <div class="success-card" id="success-card">
            <h1 style="color:#30d158; font-size:48px;">✓</h1>
            <h2>ORDER CONFIRMED!</h2>
            <p style="color:#86868b;">CHECK YOUR EMAIL FOR THE RECEIPT.</p>
            <div style="background:#000; padding:20px; border-radius:15px; margin:20px 0; text-align:left;">
                <p style="font-size:10px; color:#86868b; margin-bottom:5px;">ORDER ID: <span id="res-order-id" style="color:#fff;"></span></p>
                <p style="font-size:10px; color:#86868b; margin-bottom:5px;">METHOD: <span id="res-method" style="color:#fff;"></span></p>
                <p style="font-size:14px; color:#fff; font-weight:800; margin-top:10px;">TOTAL: <span id="res-amount"></span></p>
            </div>
            <button onclick="window.location.href='index.html'" class="pay-btn ready">BACK TO SHOP</button>
        </div>
    </div>

    <script>
    let activeTab = 'card';
    const currentUser = localStorage.getItem('userName') || localStorage.getItem('loggedInUser');
    const cartKey = currentUser ? `cart_${currentUser}` : 'cart';
    const historyKey = currentUser ? `orderHistory_${currentUser}` : 'orderHistory';

    // 1. TABS AND VALIDATION LOGIC
    function setTab(type, el) {
        activeTab = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('section-card').style.display = type === 'card' ? 'block' : 'none';
        document.getElementById('section-upi').style.display = type === 'upi' ? 'block' : 'none';
        document.getElementById('section-cod').style.display = type === 'cod' ? 'block' : 'none';
        validate();
    }

    function validate() {
        let ok = false;
        const emailInput = document.getElementById('email');
        const emailOk = emailInput && emailInput.value.includes('@');
        
        if(activeTab === 'card') {
            ok = Array.from(document.querySelectorAll('.v-card')).every(i => i.value.length >= 3);
        } else if(activeTab === 'upi') {
            const upiInput = document.querySelector('.v-upi');
            ok = upiInput && upiInput.value.includes('@');
        } else { 
            ok = true; 
        }
        
        const finalOk = ok && emailOk;
        const btn = document.getElementById('main-action');
        if (btn) {
            btn.disabled = !finalOk;
            btn.classList.toggle('ready', finalOk);
            btn.innerText = finalOk ? "COMPLETE PURCHASE" : "ENTER DETAILS";
        }
    }

    // Listen for any input to trigger validation
    document.querySelectorAll('input').forEach(i => i.addEventListener('input', validate));

    // 2. SUBMISSION AND EMAIL
    document.getElementById('payForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Pull from the private locker
        const cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        if (cart.length === 0) return alert("BAG IS EMPTY");

        const orderID = 'UK-' + Math.floor(1000 + Math.random() * 9000) + '-TX';
        const userEmail = document.getElementById('email').value;
        let total = 0;
        cart.forEach(i => total += (i.price * (i.quantity || 1)));

        // --- STEP A: SAVE TO HISTORY ---
        let history = JSON.parse(localStorage.getItem(historyKey)) || [];
        history.push({ 
            id: orderID, 
            amount: total.toFixed(2), 
            date: new Date().toLocaleDateString(), 
            method: activeTab.toUpperCase() 
        });
        localStorage.setItem(historyKey, JSON.stringify(history));

        // --- STEP B: TRIGGER EMAIL ---
        // CRITICAL: URL matches the new route in server.js
        try {
            await fetch('http://localhost:5000/api/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: userEmail, 
                    orderID: orderID, 
                    total: total.toFixed(2) 
                })
            });
            console.log("Confirmation email sent to " + userEmail);
        } catch(err) { 
            console.log("Email failed, but order was saved to history."); 
        }

        // --- STEP C: SHOW SUCCESS UI ---
        document.getElementById('res-order-id').innerText = orderID;
        document.getElementById('res-method').innerText = activeTab.toUpperCase();
        document.getElementById('res-amount').innerText = `$${total.toFixed(2)}`;
        
        document.getElementById('finish-overlay').style.display = 'flex';
        
        // Clear only the current user's bag
        localStorage.removeItem(cartKey); 
        
        setTimeout(() => document.getElementById('success-card').classList.add('pop'), 50);
    });

    // 3. AUTO FORMATS (With safety checks)
    const cardNum = document.getElementById('card-num');
    if (cardNum) {
        cardNum.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '').match(/.{1,4}/g);
            e.target.value = v ? v.join(' ') : '';
        });
    }

    const cardExp = document.getElementById('card-exp');
    if (cardExp) {
        cardExp.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length >= 2) e.target.value = val.substring(0, 2) + '/' + val.substring(2, 4);
        });
    }
</script>
</body>
</html>
